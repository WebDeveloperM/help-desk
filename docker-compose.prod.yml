# ==============================================
# HelpDesk — Production (VPS)
# ==============================================
# Полный стек для развёртывания на сервере.
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Секреты и пароли — только из .env.prod (см. .env.prod.example и docs/KEYCLOAK_SETUP.md)
# ==============================================

services:
  # ======================
  # NGINX - Reverse Proxy
  # ======================
  nginx:
    image: nginx:alpine
    container_name: helpdesk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_static:/usr/share/nginx/html:ro
      - ./nginx/well-known:/var/www/well-known:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ======================
  # FRONTEND - React App
  # ======================
  frontend:
    build:
      context: ./helpDesk_front
      dockerfile: Dockerfile
      target: runner
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
    container_name: helpdesk-frontend-builder
    volumes:
      - frontend_static:/app/dist
    restart: "no"
    networks:
      - helpdesk-network

  # ======================
  # BACKEND - FastAPI
  # ======================
  backend:
    build:
      context: ./helpDesk_back
      dockerfile: Dockerfile
    container_name: helpdesk-backend
    # Multi-worker uvicorn: PKCE verifier store is Redis-backed, so workers can share state.
    # Adjust --workers based on CPU cores and memory limit below.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    expose:
      - "8000"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ======================
  # DATABASE - PostgreSQL (with pgvector for asset embeddings — migration 008 runs CREATE EXTENSION vector)
  # ======================
  db:
    image: pgvector/pgvector:pg16
    container_name: helpdesk-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-helpdesk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ======================
  # REDIS - PKCE verifier store (multi-worker safe)
  # ======================
  # Эфемерное хранилище: persistence отключён, данные живут только пока контейнер запущен.
  # PKCE verifier живёт `pkce_ttl_seconds` (10 мин), терять при рестарте не критично.
  redis:
    image: redis:7-alpine
    container_name: helpdesk-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ======================
  # OBJECT STORAGE - MinIO (asset images)
  # ======================
  # Neither port published to the host. Browser fetches images via nginx at /media/
  # (proxied to minio:9000 inside the docker network). Console (:9001) — SSH tunnel only.
  # Backend uploads to minio:9000 directly via internal network using minio-py SDK.
  # Bucket is auto-created on first upload by app/asset/services/storage.py:_ensure_bucket.
  minio:
    image: minio/minio:latest
    container_name: helpdesk-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env.prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.prod}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9000/minio/health/live || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ======================
  # KEYCLOAK DATABASE
  # ======================
  keycloak-db:
    image: postgres:16-alpine
    container_name: helpdesk-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ======================
  # KEYCLOAK - Auth Server
  # ======================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: helpdesk-keycloak
    command: start
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD must be set in .env.prod}
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-https://korxona.com}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: WARN
      KC_METRICS_ENABLED: "false"
    expose:
      - "8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    # Healthcheck отключён — Keycloak слушает 8080, но проверка в контейнере не срабатывала
    # healthcheck:
    #   test: ["CMD-SHELL", "bash -c 'echo -n >/dev/tcp/127.0.0.1/8080' 2>/dev/null || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 60
    #   start_period: 300s
    restart: unless-stopped
    networks:
      - helpdesk-network
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

# ======================
# VOLUMES
# ======================
volumes:
  postgres_data:
    name: helpdesk_postgres_data
  minio_data:
    name: helpdesk_minio_data
  keycloak_db_data:
    name: helpdesk_keycloak_db_data
  frontend_static:
    name: helpdesk_frontend_static

# ======================
# NETWORKS
# ======================
networks:
  helpdesk-network:
    name: helpdesk-network
    driver: bridge
